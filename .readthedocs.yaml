---

# Read the Docs configuration file
# See for details and customization
# - https://docs.readthedocs.io/en/stable/config-file/v2.html
# - https://docs.readthedocs.com/platform/stable/build-customization.html

# Required
version: 2

# Set the version of Python and other tools you might need
build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    pre_install:
      - pip install "snippets2changelog>=1.6.0,<2"
      # yamllint disable-line rule:line-length
      - changelog-generator changelog changelog.md --snippets=.snippets --in-place

# Build documentation in the docs/ directory with Sphinx
sphinx:
  configuration: docs/conf.py

# Optionally declare the Python requirements required to build your docs
python:
  install:
    - requirements: docs/requirements.txt
